name: Development CI/CD

on:
  push:
    branches:
      - dev

jobs:
  ci:
    uses: OpsGPT-v1/shared-workflow/.github/workflows/backend-ci.yml@main
    with:
      service_name: 'alert-ingestion-service'
      python_version: '3.12'
      working_directory: '.'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy:
    needs: ci
    permissions:
      id-token: write
      contents: read
    uses: OpsGPT-v1/shared-workflow/.github/workflows/dev-deploy.yml@main
    with:
      service_name: 'alert-ingestion-service'
      image_name: 'opsgpt/alert-ingestion-service'
      dockerfile_path: 'Dockerfile'
      context_path: '.'
      gitops_repo: 'OpsGPT-v1/helm-repo'
      gitops_branch: 'main'
      values_file_path: 'values-dev.yaml'
      yaml_image_tag_path: '.services.alert-ingestion-service.image.tag'
      acr_login_server: 'opsgpt.azurecr.io'
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
